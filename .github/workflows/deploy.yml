name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch:

# Avoid overlapping deploys.
concurrency:
  group: firebase-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FAMILY_PIN: ${{ secrets.VITE_FAMILY_PIN }}
          VITE_PARENT_EMAILS: ${{ secrets.VITE_PARENT_EMAILS }}
        run: npm run build

      - name: Write service account credentials
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$RUNNER_TEMP/sa.json"

      - name: Deploy Hosting + Firestore rules
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
          FIREBASE_PROJECT: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
        run: |
          npx firebase-tools@13 deploy \
            --only hosting,firestore:rules \
            --project "$FIREBASE_PROJECT" \
            --non-interactive

      # NOTE: Cloud Functions are deployed manually from local (npx firebase
      # deploy --only functions) because the GitHub deploy service account
      # isn't granted Functions deploy roles. They change rarely.

      - name: Clean up credentials
        if: always()
        run: rm -f "$RUNNER_TEMP/sa.json"
