name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      # Build with placeholder env so type/build errors are caught on PRs.
      - run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ci-placeholder
          VITE_FIREBASE_PROJECT_ID: ci-placeholder
          VITE_FIREBASE_AUTH_DOMAIN: ci.firebaseapp.com
          VITE_FIREBASE_STORAGE_BUCKET: ci.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: '0'
          VITE_FIREBASE_APP_ID: ci-placeholder
          VITE_FAMILY_PIN: '0000'
          VITE_PARENT_EMAILS: ci@example.com
